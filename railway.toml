[build]
builder = "nixpacks"
buildCommand = "pnpm install --no-frozen-lockfile && pnpm build"

[deploy]
startCommand = "pnpm drizzle-kit push --force && NODE_ENV=production node dist/index.js"
restartPolicyMaxRetries = 5
healthcheckPath = "/"
healthcheckTimeout = 30

[env]
# Alle Environment-Variablen werden in Railway Dashboard konfiguriert
