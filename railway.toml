[build]
builder = "nixpacks"
installCommand = "pnpm install --no-frozen-lockfile"
buildCommand = "pnpm build"

[deploy]
startCommand = "pnpm drizzle-kit push --force && NODE_ENV=production node dist/index.js"
restartPolicyMaxRetries = 5
healthcheckPath = "/"
healthcheckTimeout = 30

[environment]
# Alle Umgebungsvariablen werden im Railway Dashboard konfiguriert
